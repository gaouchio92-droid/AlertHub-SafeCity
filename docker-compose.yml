services:
  postgres:
    image: postgres:16-alpine
    container_name: alerthub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alerthub}
      POSTGRES_USER: ${POSTGRES_USER:-alerthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alerthub_network

  backend:
    build:
      context: ./backend
    container_name: alerthub_backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-AlertHub Safe City}
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-alerthub}
      POSTGRES_USER: ${POSTGRES_USER:-alerthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      EVENT_SOURCE: ${EVENT_SOURCE:-discord}
      CONNECTOR_IMPORTS: ${CONNECTOR_IMPORTS:-}
      ENABLE_DISCORD: ${ENABLE_DISCORD:-true}
      ENABLE_ZABBIX_API: ${ENABLE_ZABBIX_API:-false}
      ENABLE_ZABBIX_DB: ${ENABLE_ZABBIX_DB:-false}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      ZABBIX_API_URL: ${ZABBIX_API_URL:-}
      ZABBIX_USERNAME: ${ZABBIX_USERNAME:-}
      ZABBIX_PASSWORD: ${ZABBIX_PASSWORD:-}
      ZABBIX_DB_HOST: ${ZABBIX_DB_HOST:-}
      ZABBIX_DB_PORT: ${ZABBIX_DB_PORT:-5432}
      ZABBIX_DB_NAME: ${ZABBIX_DB_NAME:-}
      ZABBIX_DB_USER: ${ZABBIX_DB_USER:-}
      ZABBIX_DB_PASSWORD: ${ZABBIX_DB_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - alerthub_network

  frontend:
    build:
      context: ./frontend
    container_name: alerthub_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - alerthub_network

  nginx:
    image: nginx:1.27-alpine
    container_name: alerthub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - alerthub_network

volumes:
  postgres_data:

networks:
  alerthub_network:
    driver: bridge
